schema_version: "1"
name: init-from-scratch
goal: >-
  In a brand-new empty project directory, initialize axprobe and confirm the
  generated workspace files are usable and not overwritten by a second init.

probes:
  - |
    set -eu
    work="$(mktemp -d)"
    cd "$work"

    axprobe init
    test -f .axprobe/config.yaml
    test -f .axprobe/example.yaml
    grep -q 'schema_version: "1"' .axprobe/config.yaml
    grep -q 'schema_version: "1"' .axprobe/example.yaml
    grep -q 'box:' .axprobe/config.yaml
    grep -q 'goal:' .axprobe/example.yaml

    printf '\n# sentinel\n' >> .axprobe/config.yaml
    axprobe init
    grep -q '# sentinel' .axprobe/config.yaml
    axprobe lint example

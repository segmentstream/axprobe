# Optional operator defaults. Copy to ~/.axprobe/config.yaml.
#
#   cp config.example.yaml ~/.axprobe/config.yaml
#
# These are conveniences only. Precedence (highest first):
#   flag  >  env var  >  .axprobe/config.yaml defaults  >  this file
#   driver:  --driver-model        > AXPROBE_DRIVER_MODEL > defaults.driver_model > driver_model
#   review:  review --review-model > AXPROBE_REVIEW_MODEL > defaults.review_model > review_model
#
# driver_model is an operator/runtime choice, so it lives here — NOT in a scenario
# manifest (a scenario should run unchanged across many models).

# The DRIVER model — the agent under measurement. Keep it deliberately weak: if a
# weak model can drive the tool, the tool's agentic experience is genuinely good.
driver_model: moonshotai/kimi-k2.6

# The REVIEW (judge) model — turns a run report into a finding. Prefer a STRONGER
# model than the driver. It never falls back to the driver model: leave it unset
# to get the no-LLM mechanical scaffold instead of letting the instrument grade
# itself.
review_model: anthropic/claude-opus-4.8

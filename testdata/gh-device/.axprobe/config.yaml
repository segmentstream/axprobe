# Workspace: install the GitHub CLI (a real device-flow OAuth tool) for the
# end-to-end oauth verification.
schema_version: "1"
box:
  image: ubuntu:24.04
  setup:
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates
    - mkdir -p -m 755 /etc/apt/keyrings && curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null && chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
    - apt-get update -qq && apt-get install -y -qq gh
